name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  attach-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Run validation
        run: .github/scripts/validate.sh

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          PLUGIN_VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          echo "Tag version:    $TAG_VERSION"
          echo "Plugin version: $PLUGIN_VERSION"
          if [ "$TAG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "FAIL: Tag ${{ github.event.release.tag_name }} does not match plugin.json version $PLUGIN_VERSION"
            exit 1
          fi
          echo "Version match confirmed."

      - name: Create and upload plugin zip
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          zip -r "mentilead-growthOS-${VERSION}.zip" . \
            -x 'agent-os/*' \
            -x '.claude/*' \
            -x '.git/*' \
            -x '.github/*' \
            -x '.gitignore'
          gh release upload "${{ github.event.release.tag_name }}" \
            "mentilead-growthOS-${VERSION}.zip" \
            --clobber
